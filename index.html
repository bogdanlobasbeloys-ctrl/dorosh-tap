<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinyl Quest</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #player-container {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: #333; /* Тимчасовий фон */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .vinyl-part {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s, transform 0.5s;
            opacity: 0.2; /* Початковий стан — уламки ледь видні */
        }

        .vinyl-part.active {
            opacity: 1;
            transform: scale(1);
        }

        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            cursor: crosshair;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .rotating {
            animation: rotate 1.8s linear infinite; /* ~33 оберти */
        }
    </style>
</head>
<body>

    <h2 id="status-text">Рівень 1: Знайди уламок</h2>
    
    <div id="player-container">
        <img src="part1.png" id="part1" class="vinyl-part">
        <img src="part2.png" id="part2" class="vinyl-part">
        <img src="part3.png" id="part3" class="vinyl-part">
        
        <canvas id="scratch-canvas" width="300" height="300" style="display:none;"></canvas>
    </div>

    <div class="controls" id="controls">
        <input type="text" id="answer-input" placeholder="Твоя відповідь...">
        <button onclick="checkAnswer()">Відновити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо на весь екран

        const track = new Audio('a_little_death.mp3');

        function checkAnswer() {
            const ans = document.getElementById('answer-input').value.toLowerCase();
            // Тут буде запит до твого Python бекенду або проста перевірка
            if (ans === 'твоє_секретне_слово') {
                document.getElementById('part1').classList.add('active');
                tg.HapticFeedback.notificationOccurred('success');
                nextStep();
            } else {
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        function nextStep() {
            // Логіка переходу до Canvas (стирання пилу)
        }
    </script>
</body>
</html>
